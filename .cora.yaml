# Cora Code Review Configuration
# See: https://github.com/codecoradev/cora-cli

# Provider settings — matches CI (CORA_API_KEY, CORA_BASE_URL, CORA_MODEL)
provider:
  provider: freemodel
  model: gpt-5.4
  base_url: https://api.freemodel.dev/v1

# Review focus areas: security, performance, bugs, best-practice, style
focus:
  - security
  - performance
  - bugs
  - best-practice

# Custom rules / additional instructions for the reviewer
rules:
  - "This is a Tauri 2 desktop app. Frontend is Svelte 5 (runes mode: $state, $derived, $effect). Backend is Rust with rusqlite. IPC goes through @tauri-apps/api invoke(). Do not flag lack of SSR/server code — this is a purely client-side desktop app."
  - "All SQL queries use parameterized/bound statements via rusqlite params![] or ?N placeholders. Never string interpolation. Do not flag SQL injection on rusqlite params![] usage."
  - "Svelte 5 runes syntax ($state, $derived, $effect, $props) is correct and intentional. Do not flag as unused variables or suggest Svelte 4 stores ($:) syntax."

# Ignore patterns
ignore:
  files:
    - "*.lock"
    - "Cargo.lock"
    - "package-lock.json"
    - "src-tauri/gen/**"
    - "src-tauri/target/**"
    - "node_modules/**"
    - "dist/**"
  rules: []

# Hook settings
hook:
  mode: warn          # "warn" (print but allow) or "block" (fail commit)
  min_severity: major # minimum severity to trigger hook action
  max_diff_size: 5242880 # max 5MB diff chars before refusing

# Output settings
output:
  format: pretty      # pretty, json, compact, sarif
  color: true
