name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ── Frontend (Svelte + TS) ──
  frontend-check:
    name: Frontend — Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx svelte-check --threshold error || npx tsc --noEmit

  frontend-lint:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  frontend-test:
    name: Frontend — Test (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  # ── Backend (Rust / Tauri) ──
  rust-check:
    name: Rust — Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets

  rust-fmt:
    name: Rust — Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

  rust-clippy:
    name: Rust — Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  rust-test:
    name: Rust — Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  # ── Tauri system deps are not installed; skip full build on CI ──
  # (tauri build requires webkit2gtk etc. — handled by release workflow)
