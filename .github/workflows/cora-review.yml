name: Cora AI Code Review

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: cora-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  cora-review:
    name: Cora Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check required secrets
        id: secrets
        run: |
          if [ -z "${{ secrets.CORA_API_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::CORA_API_KEY not set — skipping cora review (forks lack secrets)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Cora AI Code Review
        if: steps.secrets.outputs.skip != 'true'
        uses: codecoradev/cora-review-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cora-api-key: ${{ secrets.CORA_API_KEY }}
          cora-base-url: ${{ secrets.CORA_BASE_URL }}
          cora-model: ${{ secrets.CORA_MODEL }}
